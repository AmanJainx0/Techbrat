{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - techBrat</title>
  <link rel="stylesheet" href="{% static 'css/welcome.css' %}">
</head>
<body>
  <main class="welcome-screen">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <section class="welcome-panel">
      <div class="brand-mark">
        <img src="{% static 'images/bglogo.png' %}" alt="techBrat logo">
      </div>

      <p class="eyebrow">Personalized onboarding in progress</p>
      <h1>Welcome to techBrat</h1>
      <p class="welcome-copy">Setting up your personalized experience...</p>

      <div class="status-stack">
        <div class="spinner-border text-primary loader" role="status" aria-hidden="true"></div>
        <div class="progress-line">
          <span class="progress-fill"></span>
        </div>
        <p class="status-message" id="statusMessage">Preparing your roadmap...</p>
      </div>
    </section>
  </main>

  <script src="{% static 'js/welcome.js' %}"></script>
</body>
</html>
