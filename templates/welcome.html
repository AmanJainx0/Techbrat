<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - techBrat</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <link rel="stylesheet" href="{% static 'css/welcome.css' %}" />
</head>

<body>
  <div class="welcome-container">
    <div class="welcome-card">
      <div class="welcome-icon">🎉</div>
      <h1>Welcome!</h1>
      <div class="welcome-name">Hello, {{ user.first_name|default:user.username }}! 👋</div>
      <div class="welcome-message">
        You're all set to start your tech journey with techBrat. Let's explore amazing career paths and resources together!
      </div>

      <div class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <div class="continue-text">
        Redirecting you to the home page...
      </div>
    </div>
  </div>

  <script>
    // Redirect to index after 3 seconds
    setTimeout(function () {
      window.location.href = "{% url 'techbrat:index' %}";
    }, 3000);
  </script>
</body>

</html>
